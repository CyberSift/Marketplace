name: PR JSON Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-format-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47.0.5
        with:
          separator: " "
          files: |
            **/*.json

      - name: Validate and format changed JSON files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python scripts/format_and_validate_json.py ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Commit formatted JSON files
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: auto-format json"
          file_pattern: "**/*.json"

      - name: Skip when no JSON files changed
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No JSON files changed in this PR."
